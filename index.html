<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGPI — Mes fiches de notes</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --sf:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
    --bg:#F5F5F7;--surface:#fff;--text:#1d1d1f;--muted:#6e6e73;--border:#d2d2d7;
  }
  body{font-family:var(--sf);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
  #app{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
  .page{display:none}
  .page.active{display:block}

  /* HEADER */
  .header{display:flex;align-items:center;gap:12px;margin-bottom:2rem}
  .logo{font-size:1rem;font-weight:700;color:#6C63FF;background:#eeeeff;padding:7px 14px;border-radius:10px;letter-spacing:-.2px;cursor:pointer;user-select:none}
  .page-title{font-size:1.5rem;font-weight:600;letter-spacing:-.4px}

  /* HOME */
  .home-search-wrap{position:relative;margin-bottom:1.5rem}
  .home-search-wrap input{width:100%;padding:12px 16px 12px 42px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:var(--sf);background:var(--surface);color:var(--text);outline:none;transition:border .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
  .home-search-wrap input:focus{border-color:#6C63FF;box-shadow:0 0 0 3px rgba(108,99,255,.1)}
  .home-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
  .home-subtitle{font-size:14px;color:var(--muted);margin-bottom:1.2rem}
  .grid-home{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
  .mod-tile{border:none;border-radius:16px;padding:1.3rem 1.2rem;cursor:pointer;text-align:left;display:flex;flex-direction:column;gap:8px;width:100%;font-family:var(--sf);transition:transform .15s,box-shadow .15s}
  .mod-tile:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.11)}
  .mod-tile:active{transform:scale(.97)}
  .tile-icon{font-size:1.7rem}
  .tile-name{font-size:14px;font-weight:600}
  .tile-count{font-size:12.5px;opacity:.7}

  /* SEARCH RESULTS */
  .search-results-title{font-size:13px;color:var(--muted);margin-bottom:1rem;font-weight:500}
  .search-results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
  .search-mod-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;margin-bottom:6px}

  /* MODULE PAGE */
  .back-btn{display:inline-flex;align-items:center;gap:7px;cursor:pointer;margin-bottom:1.3rem;background:none;border:none;font-family:var(--sf);padding:0}
  .back-btn:hover .back-arr{transform:translateX(-3px)}
  .back-arr{font-size:16px;color:var(--muted);transition:transform .15s;display:inline-block}
  .back-lbl{font-size:13.5px;color:var(--muted);font-weight:500}
  .mod-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:1.2rem}
  .mod-pill{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;font-size:13.5px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
  .mod-header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .sort-select{padding:7px 10px;border:1px solid var(--border);border-radius:9px;font-size:13px;font-family:var(--sf);color:var(--text);background:var(--surface);outline:none;cursor:pointer}
  .sort-select:focus{border-color:#6C63FF}
  .btn-new{padding:9px 18px;color:#fff;border:none;border-radius:10px;font-size:13.5px;font-weight:500;font-family:var(--sf);cursor:pointer;transition:filter .15s}
  .btn-new:hover{filter:brightness(.88)}
  .toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:1.2rem}
  .search-wrap{position:relative;flex:1;min-width:180px}
  .search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1px solid var(--border);border-radius:10px;font-size:13.5px;font-family:var(--sf);background:var(--surface);color:var(--text);outline:none;transition:border .2s}
  .search-wrap input:focus{border-color:#6C63FF;box-shadow:0 0 0 3px rgba(108,99,255,.1)}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .tags-row{display:flex;flex-wrap:wrap;gap:6px}
  .ftag{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:none;font-family:var(--sf);transition:all .15s}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
  .card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:1.1rem;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
  .card-accent{position:absolute;top:0;left:0;right:0;height:3px}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin:6px 0 4px}
  .card-title{font-size:13.5px;font-weight:600;line-height:1.3;letter-spacing:-.2px;color:var(--text);flex:1}
  .type-badge{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .card-breadcrumb{font-size:11px;color:var(--muted);margin-bottom:4px;font-style:italic}
  .card-preview{font-size:12px;color:var(--muted);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .ctag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
  .card-date{font-size:11px;color:var(--muted);margin-top:7px}
  .empty-state{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--muted)}
  .empty-state p{font-size:14px;margin-bottom:1.2rem}

  /* FICHE PAGE */
  .fiche-module-label{font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.4rem}
  .fiche-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:.6rem;flex-wrap:wrap}
  .fiche-title{font-size:1.6rem;font-weight:600;letter-spacing:-.4px;line-height:1.2;flex:1}
  .fiche-type-badge{font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;white-space:nowrap;margin-top:4px}
  .fiche-breadcrumb{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1.1rem;margin-top:.5rem}
  .breadcrumb-label{font-size:11.5px;color:var(--muted);font-weight:500}
  .breadcrumb-path{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .bc-step{font-size:12.5px;font-weight:500;padding:3px 10px;border-radius:7px;background:var(--surface);border:1px solid var(--border);color:var(--text)}
  .bc-arrow{font-size:12px;color:var(--muted)}
  .fiche-body{font-size:14px;line-height:1.75;white-space:pre-wrap;background:var(--surface);border:1px solid var(--border);padding:1.2rem;border-radius:12px;margin-bottom:1.2rem;color:var(--text)}
  .fiche-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem}
  .fiche-date{font-size:12px;color:var(--muted);margin-bottom:1.5rem}
  .fiche-actions{display:flex;gap:10px;flex-wrap:wrap}
  .btn-edit{padding:9px 20px;color:#fff;border:none;border-radius:10px;font-size:13.5px;font-weight:500;font-family:var(--sf);cursor:pointer}
  .btn-edit:hover{filter:brightness(.88)}
  .btn-delete{padding:9px 20px;background:transparent;color:#cc0022;border:1.5px solid #ffd0d5;border-radius:10px;font-size:13.5px;font-weight:500;font-family:var(--sf);cursor:pointer}
  .btn-delete:hover{background:#fff0f2}

  /* FORM PAGE */
  .form-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:1.8rem;max-width:660px}
  .field{margin-bottom:1.1rem}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  .field input,.field textarea,.field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--sf);color:var(--text);background:var(--bg);outline:none;transition:border .2s}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:#6C63FF;box-shadow:0 0 0 3px rgba(108,99,255,.1)}
  .field textarea{min-height:150px;resize:vertical}
  .field-hint{font-size:11.5px;color:var(--muted);margin-top:5px}
  .type-grid{display:flex;gap:8px;flex-wrap:wrap}
  .type-btn{padding:8px 15px;border-radius:9px;border:1.5px solid var(--border);background:transparent;font-family:var(--sf);font-size:13px;cursor:pointer;transition:all .15s;color:var(--muted)}
  .type-btn.selected{font-weight:600}
  .form-actions{display:flex;gap:10px;margin-top:1.5rem;flex-wrap:wrap}
  .btn-save{padding:10px 22px;background:#6C63FF;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:var(--sf);cursor:pointer}
  .btn-save:hover{background:#5550e0}
  .btn-cancel-form{padding:10px 18px;background:transparent;color:var(--muted);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:var(--sf);cursor:pointer}
  .chips-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);min-height:44px;align-items:center;cursor:text;transition:border .2s}
  .chips-wrap:focus-within{border-color:#6C63FF;box-shadow:0 0 0 3px rgba(108,99,255,.1)}
  .chip{background:#eeeeff;color:#6C63FF;font-size:12.5px;padding:4px 10px;border-radius:20px;display:flex;align-items:center;gap:5px}
  .chip-x{cursor:pointer;font-size:11px;opacity:.55;line-height:1}
  .chip-x:hover{opacity:1}
  .chips-wrap input{border:none;outline:none;font-size:13.5px;font-family:var(--sf);background:transparent;color:var(--text);min-width:100px;flex:1}

  /* TOAST */
  .toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1d1d1f;color:#fff;font-size:13px;padding:8px 16px;border-radius:20px;font-family:var(--sf);opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2)}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo" id="logo-btn">LGPI</div>
    <div class="page-title" id="page-title">Mes fiches de notes</div>
  </div>

  <!-- PAGE : ACCUEIL -->
  <div class="page active" id="page-home">
    <div class="home-search-wrap">
      <span class="home-search-icon">⌕</span>
      <input type="text" id="global-search" placeholder="Rechercher dans toutes les fiches...">
    </div>
    <div id="global-results" style="display:none">
      <div class="search-results-title" id="global-results-title"></div>
      <div class="search-results-grid" id="global-results-grid"></div>
    </div>
    <div id="home-modules">
      <p class="home-subtitle">Sélectionne un module pour accéder à ses fiches</p>
      <div class="grid-home" id="grid-home"></div>
    </div>
  </div>

  <!-- PAGE : MODULE -->
  <div class="page" id="page-module">
    <button class="back-btn" id="back-to-home">
      <span class="back-arr">←</span>
      <span class="back-lbl">Tous les modules</span>
    </button>
    <div class="mod-header">
      <span class="mod-pill" id="mod-pill"><span class="dot" id="mod-dot"></span><span id="mod-pill-label"></span></span>
      <div class="mod-header-right">
        <select class="sort-select" id="sort-select">
          <option value="date-desc">Plus récentes</option>
          <option value="date-asc">Plus anciennes</option>
          <option value="alpha">Alphabétique</option>
          <option value="type">Par type</option>
        </select>
        <button class="btn-new" id="btn-new-fiche">+ Nouvelle fiche</button>
      </div>
    </div>
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Rechercher dans ce module...">
      </div>
      <div class="tags-row" id="tags-row"></div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <!-- PAGE : FICHE DETAIL -->
  <div class="page" id="page-fiche">
    <button class="back-btn" id="back-to-module">
      <span class="back-arr">←</span>
      <span class="back-lbl" id="back-module-lbl">Retour</span>
    </button>
    <div class="fiche-module-label" id="fiche-mod-label"></div>
    <div class="fiche-header">
      <div class="fiche-title" id="fiche-title"></div>
      <span class="fiche-type-badge" id="fiche-type-badge"></span>
    </div>
    <div class="fiche-breadcrumb" id="fiche-breadcrumb"></div>
    <div class="fiche-body" id="fiche-body"></div>
    <div class="fiche-tags" id="fiche-tags"></div>
    <div class="fiche-date" id="fiche-date"></div>
    <div class="fiche-actions">
      <button class="btn-edit" id="btn-edit-fiche">Modifier</button>
      <button class="btn-delete" id="btn-delete-fiche">Supprimer</button>
    </div>
  </div>

  <!-- PAGE : FORMULAIRE -->
  <div class="page" id="page-form">
    <button class="back-btn" id="back-from-form">
      <span class="back-arr">←</span>
      <span class="back-lbl">Annuler</span>
    </button>
    <div class="form-card">
      <div class="field"><label>Titre</label><input type="text" id="form-title" placeholder="Titre de la fiche"></div>
      <div class="field"><label>Module</label><select id="form-module"></select></div>
      <div class="field">
        <label>Type de fiche</label>
        <div class="type-grid" id="type-grid"></div>
      </div>
      <div class="field">
        <label>Chemin dans le logiciel</label>
        <input type="text" id="form-path" placeholder="ex: Stock > Inventaires > Nouvel inventaire">
        <div class="field-hint">Sépare les étapes avec " > " pour afficher un breadcrumb</div>
      </div>
      <div class="field"><label>Contenu</label><textarea id="form-content" placeholder="Tes notes ici..."></textarea></div>
      <div class="field">
        <label>Tags (Entrée pour valider)</label>
        <div class="chips-wrap" id="chips-wrap">
          <span id="chips-list"></span>
          <input type="text" id="chip-input" placeholder="Ajouter un tag...">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-save" id="form-save">Enregistrer</button>
        <button class="btn-cancel-form" id="form-cancel">Annuler</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Sauvegardé ✓</div>

<script>
const MODS = [
  {id:'stock',         label:'Gestion de stock',           icon:'📦', bg:'#E0FAF2', color:'#43D9AD', tc:'#1A8C6A'},
  {id:'facturation',   label:'Facturation',                 icon:'🧾', bg:'#FFF4DC', color:'#FFB547', tc:'#996600'},
  {id:'teletrans',     label:'Télétransmission',            icon:'📡', bg:'#EDE9FF', color:'#6C63FF', tc:'#5048CC'},
  {id:'clients',       label:'Données Clients/Praticiens',  icon:'👥', bg:'#FFE8EE', color:'#FF6584', tc:'#CC3355'},
  {id:'operateurs',    label:'Données Opérateurs/Profils',  icon:'🔐', bg:'#FFE9DC', color:'#FF8C42', tc:'#CC5500'},
  {id:'serialisation', label:'Sérialisation',               icon:'🔢', bg:'#DCF2FC', color:'#5BC8F5', tc:'#1A7FAA'},
  {id:'credits',       label:'Crédits/Encours',             icon:'💳', bg:'#EDFCE8', color:'#52C41A', tc:'#2D7A0A'},
];

const TYPES = [
  {id:'procedure', label:'Procédure',  emoji:'📋', bg:'#E8F4FD', color:'#1A7FAA'},
  {id:'astuce',    label:'Astuce',     emoji:'💡', bg:'#FFF9E6', color:'#996600'},
  {id:'attention', label:'Attention',  emoji:'⚠️', bg:'#FFF0F0', color:'#CC0022'},
  {id:'info',      label:'Info',       emoji:'ℹ️', bg:'#EEF2FF', color:'#5048CC'},
];

const T = id => TYPES.find(t => t.id === id) || TYPES[0];
const M = id => MODS.find(m => m.id === id) || MODS[MODS.length-1];
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const today = () => new Date().toISOString().slice(0,10);

let notes = JSON.parse(localStorage.getItem('lgpi-notes') || 'null') || [];
let curMod = null, curFicheId = null, editingId = null;
let chipTags = [], activeTags = [], selectedType = 'procedure';
let toastTimer = null;

const save = () => { localStorage.setItem('lgpi-notes', JSON.stringify(notes)); showToast(); };

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ─── RECHERCHE GLOBALE ──────────────────────────────────────
document.getElementById('global-search').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  const resDiv = document.getElementById('global-results');
  const homeDiv = document.getElementById('home-modules');
  const grid = document.getElementById('global-results-grid');
  const title = document.getElementById('global-results-title');
  if (!q) { resDiv.style.display = 'none'; homeDiv.style.display = ''; return; }
  resDiv.style.display = ''; homeDiv.style.display = 'none';
  const found = notes.filter(n =>
    n.title.toLowerCase().includes(q) ||
    (n.content||'').toLowerCase().includes(q) ||
    (n.tags||[]).join(' ').toLowerCase().includes(q) ||
    (n.path||'').toLowerCase().includes(q)
  );
  title.textContent = found.length
    ? `${found.length} fiche${found.length>1?'s':''} trouvée${found.length>1?'s':''} pour "${this.value}"`
    : `Aucun résultat pour "${this.value}"`;
  grid.innerHTML = '';
  found.forEach(n => {
    const m = M(n.module); const tp = T(n.type);
    const c = document.createElement('div'); c.className = 'card';
    c.innerHTML = `<div class="card-accent" style="background:${m.color}"></div>
      <span class="search-mod-badge" style="background:${m.bg};color:${m.tc}">${m.icon} ${m.label}</span>
      <div class="card-top">
        <div class="card-title">${esc(n.title)}</div>
        <span class="type-badge" style="background:${tp.bg};color:${tp.color}">${tp.emoji} ${tp.label}</span>
      </div>
      ${n.path ? `<div class="card-breadcrumb">↳ ${esc(n.path)}</div>` : ''}
      <div class="card-preview">${esc(n.content||'')}</div>
      <div class="card-tags">${(n.tags||[]).map(t=>`<span class="ctag" style="background:${m.bg};color:${m.tc}">${esc(t)}</span>`).join('')}</div>`;
    c.addEventListener('click', () => { curMod = n.module; goFiche(n.id); });
    grid.appendChild(c);
  });
});

// ─── ACCUEIL ────────────────────────────────────────────────
function goHome() {
  activeTags = [];
  document.getElementById('global-search').value = '';
  document.getElementById('global-results').style.display = 'none';
  document.getElementById('home-modules').style.display = '';
  document.getElementById('page-title').textContent = 'Mes fiches de notes';
  const g = document.getElementById('grid-home');
  g.innerHTML = '';
  MODS.forEach(m => {
    const cnt = notes.filter(n => n.module === m.id).length;
    const b = document.createElement('button');
    b.className = 'mod-tile'; b.style.background = m.bg;
    b.innerHTML = `<span class="tile-icon">${m.icon}</span>
      <span class="tile-name" style="color:${m.tc}">${m.label}</span>
      <span class="tile-count" style="color:${m.tc}">${cnt} fiche${cnt!==1?'s':''}</span>`;
    b.addEventListener('click', () => goModule(m.id));
    g.appendChild(b);
  });
  showPage('page-home');
}

// ─── MODULE ─────────────────────────────────────────────────
function goModule(mid) {
  curMod = mid; activeTags = [];
  const m = M(mid);
  document.getElementById('page-title').textContent = m.label;
  document.getElementById('mod-pill').style.background = m.bg;
  document.getElementById('mod-dot').style.background = m.color;
  const lbl = document.getElementById('mod-pill-label');
  lbl.textContent = m.label; lbl.style.color = m.tc;
  document.getElementById('btn-new-fiche').style.background = m.color;
  document.getElementById('search-input').value = '';
  document.getElementById('sort-select').value = 'date-desc';
  renderCards();
  showPage('page-module');
}

function getSorted(arr) {
  const sort = document.getElementById('sort-select').value;
  const copy = [...arr];
  if (sort === 'date-desc') return copy.sort((a,b) => (b.id||0)-(a.id||0));
  if (sort === 'date-asc')  return copy.sort((a,b) => (a.id||0)-(b.id||0));
  if (sort === 'alpha')     return copy.sort((a,b) => a.title.localeCompare(b.title, 'fr'));
  if (sort === 'type')      return copy.sort((a,b) => (a.type||'').localeCompare(b.type||''));
  return copy;
}

function renderCards() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const m = M(curMod);
  const modNotes = notes.filter(n => n.module === curMod);
  const allT = [...new Set(modNotes.flatMap(n => n.tags||[]))];
  const tr = document.getElementById('tags-row');
  tr.innerHTML = '';
  allT.forEach(t => {
    const active = activeTags.includes(t);
    const s = document.createElement('span');
    s.className = 'ftag'; s.textContent = t;
    s.style.background = active ? m.color : m.bg;
    s.style.color = active ? '#fff' : m.tc;
    s.addEventListener('click', () => {
      activeTags = active ? activeTags.filter(x => x !== t) : [...activeTags, t];
      renderCards();
    });
    tr.appendChild(s);
  });
  let filtered = modNotes.filter(n => {
    const mq = !q || n.title.toLowerCase().includes(q) || (n.content||'').toLowerCase().includes(q) || (n.tags||[]).join(' ').includes(q);
    const mt = activeTags.length === 0 || activeTags.every(t => (n.tags||[]).includes(t));
    return mq && mt;
  });
  filtered = getSorted(filtered);
  const g = document.getElementById('cards-grid');
  g.innerHTML = '';
  if (!filtered.length) {
    const em = document.createElement('div'); em.className = 'empty-state';
    em.innerHTML = `<p>Aucune fiche dans ce module.</p>
      <button class="btn-new" style="background:${m.color}" id="empty-new">+ Créer la première fiche</button>`;
    g.appendChild(em);
    document.getElementById('empty-new').addEventListener('click', () => openForm(null));
    return;
  }
  filtered.forEach(n => {
    const tp = T(n.type);
    const c = document.createElement('div'); c.className = 'card';
    c.innerHTML = `<div class="card-accent" style="background:${m.color}"></div>
      <div class="card-top">
        <div class="card-title">${esc(n.title)}</div>
        <span class="type-badge" style="background:${tp.bg};color:${tp.color}">${tp.emoji} ${tp.label}</span>
      </div>
      ${n.path ? `<div class="card-breadcrumb">↳ ${esc(n.path)}</div>` : ''}
      <div class="card-preview">${esc(n.content||'')}</div>
      <div class="card-tags">${(n.tags||[]).map(t=>`<span class="ctag" style="background:${m.bg};color:${m.tc}">${esc(t)}</span>`).join('')}</div>
      <div class="card-date">${n.date||''}</div>`;
    c.addEventListener('click', () => goFiche(n.id));
    g.appendChild(c);
  });
}

// ─── FICHE ──────────────────────────────────────────────────
function goFiche(id) {
  curFicheId = id;
  const n = notes.find(x => x.id === id);
  const m = M(n.module); const tp = T(n.type);
  document.getElementById('page-title').textContent = n.title;
  document.getElementById('back-module-lbl').textContent = m.label;
  const ml = document.getElementById('fiche-mod-label');
  ml.textContent = m.icon + ' ' + m.label; ml.style.color = m.color;
  document.getElementById('fiche-title').textContent = n.title;
  const tb = document.getElementById('fiche-type-badge');
  tb.textContent = tp.emoji + ' ' + tp.label;
  tb.style.background = tp.bg; tb.style.color = tp.color;
  const bc = document.getElementById('fiche-breadcrumb');
  bc.innerHTML = '';
  if (n.path && n.path.trim()) {
    const lbl = document.createElement('span'); lbl.className = 'breadcrumb-label'; lbl.textContent = 'Chemin :';
    bc.appendChild(lbl);
    const pathDiv = document.createElement('div'); pathDiv.className = 'breadcrumb-path';
    n.path.split('>').map(s => s.trim()).filter(Boolean).forEach((s, i, arr) => {
      const sp = document.createElement('span'); sp.className = 'bc-step'; sp.textContent = s;
      pathDiv.appendChild(sp);
      if (i < arr.length - 1) { const a = document.createElement('span'); a.className = 'bc-arrow'; a.textContent = '›'; pathDiv.appendChild(a); }
    });
    bc.appendChild(pathDiv);
  }
  document.getElementById('fiche-body').textContent = n.content || '';
  document.getElementById('fiche-tags').innerHTML = (n.tags||[]).map(t=>`<span class="ctag" style="background:${m.bg};color:${m.tc}">${esc(t)}</span>`).join('');
  document.getElementById('fiche-date').textContent = n.date ? 'Créée le ' + n.date : '';
  document.getElementById('btn-edit-fiche').style.background = m.color;
  showPage('page-fiche');
}

// ─── FORMULAIRE ─────────────────────────────────────────────
function buildTypeGrid() {
  const g = document.getElementById('type-grid');
  g.innerHTML = '';
  TYPES.forEach(tp => {
    const b = document.createElement('button');
    b.className = 'type-btn' + (selectedType === tp.id ? ' selected' : '');
    b.style.color = tp.color;
    if (selectedType === tp.id) { b.style.background = tp.bg; b.style.borderColor = tp.color; }
    b.textContent = tp.emoji + ' ' + tp.label;
    b.addEventListener('click', () => { selectedType = tp.id; buildTypeGrid(); });
    g.appendChild(b);
  });
}

function openForm(id) {
  editingId = id;
  const n = id ? notes.find(x=>x.id===id) : null;
  chipTags = n ? (n.tags||[]).slice() : [];
  selectedType = n ? (n.type || 'procedure') : 'procedure';
  const m = curMod ? M(curMod) : MODS[0];
  document.getElementById('page-title').textContent = id ? 'Modifier la fiche' : 'Nouvelle fiche';
  document.getElementById('form-title').value = n ? n.title : '';
  document.getElementById('form-content').value = n ? (n.content||'') : '';
  document.getElementById('form-path').value = n ? (n.path||'') : '';
  document.getElementById('form-module').innerHTML = MODS.map(x => `<option value="${x.id}"${(n?n.module===x.id:x.id===curMod)?' selected':''}>${x.label}</option>`).join('');
  document.getElementById('form-save').style.background = m.color;
  buildTypeGrid();
  renderChips();
  showPage('page-form');
}

function renderChips() {
  const cl = document.getElementById('chips-list');
  if (!cl) return;
  cl.innerHTML = '';
  chipTags.forEach((t, i) => {
    const sp = document.createElement('span'); sp.className = 'chip';
    sp.appendChild(document.createTextNode(t));
    const x = document.createElement('span'); x.className = 'chip-x'; x.textContent = '✕';
    x.addEventListener('click', () => { chipTags.splice(i,1); renderChips(); });
    sp.appendChild(x); cl.appendChild(sp);
  });
}

// ─── EVENTS ─────────────────────────────────────────────────
document.getElementById('logo-btn').addEventListener('click', goHome);
document.getElementById('back-to-home').addEventListener('click', goHome);
document.getElementById('back-to-module').addEventListener('click', () => goModule(curMod));
document.getElementById('back-from-form').addEventListener('click', () => { if(editingId) goFiche(editingId); else goModule(curMod); });
document.getElementById('form-cancel').addEventListener('click', () => { if(editingId) goFiche(editingId); else goModule(curMod); });
document.getElementById('btn-new-fiche').addEventListener('click', () => openForm(null));
document.getElementById('btn-edit-fiche').addEventListener('click', () => openForm(curFicheId));
document.getElementById('search-input').addEventListener('input', renderCards);
document.getElementById('sort-select').addEventListener('change', renderCards);
document.getElementById('btn-delete-fiche').addEventListener('click', () => {
  if (!confirm('Supprimer cette fiche ?')) return;
  notes = notes.filter(x => x.id !== curFicheId);
  save(); goModule(curMod);
});
document.getElementById('chip-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const v = e.target.value.trim();
    if (v && !chipTags.includes(v)) { chipTags.push(v); renderChips(); }
    e.target.value = '';
  }
});
document.getElementById('chips-wrap').addEventListener('click', () => document.getElementById('chip-input').focus());
document.getElementById('form-save').addEventListener('click', () => {
  const title = document.getElementById('form-title').value.trim();
  const module = document.getElementById('form-module').value;
  const content = document.getElementById('form-content').value.trim();
  const path = document.getElementById('form-path').value.trim();
  if (!title) { alert('Le titre est requis.'); return; }
  const ci = document.getElementById('chip-input');
  if (ci && ci.value.trim()) chipTags.push(ci.value.trim());
  if (editingId) {
    Object.assign(notes.find(x => x.id === editingId), {title, module, content, path, type: selectedType, tags: [...chipTags]});
    save(); goFiche(editingId);
  } else {
    notes.unshift({id: Date.now(), title, module, content, path, type: selectedType, tags: [...chipTags], date: today()});
    save(); goModule(module);
  }
});

goHome();
</script>
</body>
</html>
